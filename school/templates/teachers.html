{% extends 'base.html' %}

{% block title %}
    Teachers list
{% endblock %}

{% block content %}
    <h1>Teachers List</h1>

    <ul>
      {% for teacher in teachers %}
        <li>{{ teacher.name }} — Avg Score: {{ teacher.avg_score|default:"No students" }}</li>
      {% endfor %}
    </ul>
{% endblock %}
